name: Cloud simulated trading

on:
  schedule:
    # Restrict wakeups to each market's weekday session so a private repository
    # remains comfortably inside the GitHub Free monthly Actions allowance.
    - cron: "2,17,32,47 9-11,13-15 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "2,17,32,47 9-16 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      market:
        description: Market cycle to run
        required: true
        default: auto
        type: choice
        options:
          - auto
          - a_share
          - us_stock
          - both
      push_test:
        description: Send a ServerChan test message
        required: true
        default: false
        type: boolean
      publish_only:
        description: Publish dashboard without running a simulation cycle
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cloud-simulated-trading
  cancel-in-progress: false

jobs:
  simulate-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out simulation state
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Choose active market
        id: market
        env:
          REQUESTED_MARKET: ${{ inputs.market || 'auto' }}
          PUBLISH_ONLY: ${{ inputs.publish_only || 'false' }}
        run: |
          if [ "$PUBLISH_ONLY" = "true" ]; then
            echo "market=closed" >> "$GITHUB_OUTPUT"
            echo "run_cycle=false" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          market="$REQUESTED_MARKET"
          if [ "$market" = "auto" ]; then
            market="$(python3 work/market-data/cloud_schedule.py)"
          fi
          echo "market=$market" >> "$GITHUB_OUTPUT"
          if [ "$market" = "closed" ]; then
            echo "run_cycle=false" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_cycle=true" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify safety rules
        if: steps.market.outputs.run_cycle == 'true'
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Snapshot ledger before this cycle
        if: steps.market.outputs.run_cycle == 'true'
        run: cp outputs/daily-quant/execution/execution-ledger.csv /tmp/execution-ledger-before.csv

      - name: Run simulated market cycle
        if: steps.market.outputs.run_cycle == 'true'
        id: cycle
        continue-on-error: true
        run: scripts/run_cloud_cycle.sh "${{ steps.market.outputs.market }}"

      - name: Send WeChat notifications
        if: always() && steps.market.outputs.run_cycle == 'true'
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: >-
          python3 work/market-data/notify_serverchan.py
          --before /tmp/execution-ledger-before.csv
          --market "${{ steps.market.outputs.market }}"
          --result "${{ steps.cycle.outcome }}"

      - name: Test WeChat connection
        if: github.event_name == 'workflow_dispatch' && inputs.push_test
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 work/market-data/notify_serverchan.py --test

      - name: Save updated simulation ledger
        if: always() && steps.market.outputs.run_cycle == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily-quant
          if ! git diff --cached --quiet; then
            git commit -m "chore: update simulated market state"
            git push
          fi

      - name: Prepare public dashboard
        if: steps.market.outputs.publish == 'true' && (steps.market.outputs.run_cycle == 'false' || steps.cycle.outcome == 'success') && github.event.repository.private == false
        run: |
          python3 work/market-data/publish_site.py
          touch /tmp/quant-site-public/.nojekyll

      - name: Configure GitHub Pages
        if: steps.market.outputs.publish == 'true' && (steps.market.outputs.run_cycle == 'false' || steps.cycle.outcome == 'success') && github.event.repository.private == false
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        if: steps.market.outputs.publish == 'true' && (steps.market.outputs.run_cycle == 'false' || steps.cycle.outcome == 'success') && github.event.repository.private == false
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/quant-site-public

      - name: Deploy dashboard
        if: steps.market.outputs.publish == 'true' && (steps.market.outputs.run_cycle == 'false' || steps.cycle.outcome == 'success') && github.event.repository.private == false
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Fail the workflow when the market cycle failed
        if: steps.market.outputs.run_cycle == 'true' && steps.cycle.outcome == 'failure'
        run: exit 1
